    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>

<body>
    <nav class="navbar navbar-expand-md">
        <div class="titles_pages">
            <a href="home2.html"><img class="logo" src="logo3.jfif" width="11%"></a> SIGN UP
        </div>
        <ul class="navbar-nav ml-auto">
            </li>
            <li>
                <a class="top_title" href="login.html"> LOGIN </a>
            </li>
        </ul>
        </div>
    </nav>
    <div class="row">
        <div class="column"></div>
        <div class="column" class="container-fluid text-center">
            <div class="row content">
                <div class="col-sm-12 text-center">
                    <br><br><br><br><br>
                    <form class="login_words">
                        <div class="aright">
                            <label>Username: </label>
                            <input type="text" id="Username" name="Username" required><br>
                            <label>Password: </label>
                            <input type="password" id="Password" name="Password" required><br>
                            <label>Full Name: </label>
                            <input type="text" id="full_name" name="full_name" required><br>
                        </div>
                        <div class="aleft">
                            <label>Gender: </label>
                            <select name="Gender" id="Gender" required>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select><br>
                        </div>
                        <div class="aright"></div>
                        <label>Address: </label>
                        <input type="text" id="Address" name="Address" required><br>
                        <label>Mobile Number: </label>
                        <input type="number" id="mobile_number" name="MobileNumber" required><br>
                        <label>Email Address: </label>
                        <input type="email" id="Email" name="Email" required><br>
                        <input class="button" type="button" value="Submit" onclick="signup()">
                </div>
                </form>
            </div>
        </div>
    </div>
    <div class="column"></div>
    </div>
