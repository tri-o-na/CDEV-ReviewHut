<div class="modal fade" id="reviewModal" tabindex="-1" role="dialog" aria-labelledby="reviewModalLabel"
  aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content chg-color3">
      <div class="modal-header">
        <h5 class="modal-title chg-color1a" id="restaurant_review">Your Review</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="chg-color3">
          <div class="form-group">
            <label for="recipient-name" class="col-form-label chg-color1b">Rating:&nbsp;</label>
            <select class="rating-no" name="Rating" id="Rating" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div class="form-group">
            <label for="Review" class="col-form-label chg-color1b">Review:</label>
            <textarea class="form-control chg-color3" id="Review"></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn button3" data-dismiss="modal" id="submit_review"
              onClick="addReview()">DONE</button>
            <button type="button" class="btn btn-secondary button4" data-dismiss="modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<div class="modal fade" id="reviewModal2" tabindex="-1" role="dialog" aria-labelledby="reviewModalLabel"
  aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content chg-color3">
      <div class="modal-header">
        <h5 class="modal-title chg-color1a" id="restaurant_id">Your Review</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="chg-color3">
          <div class="form-group">
            <label for="recipient-name" id="Rating" class="col-form-label chg-color1b">Rating:&nbsp;</label>
            <select class="rating-no" name="Rating" id="Rating1" required>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </div>
          <div class="form-group">
            <label for="Review" class="col-form-label chg-color1b">Review:</label>
            <textarea class="form-control chg-color3" id="Review1"></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn button3" data-dismiss="modal" id="submit_review"
              onClick="updateReview()">UPDATE</button>
            <button type="button" class="btn btn-secondary button4" data-dismiss="modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
